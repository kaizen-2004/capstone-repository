name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-windows:
    name: Build Windows executable
    runs-on: windows-2022
    env:
      PYTHON_VERSION: "3.11"
      NODE_VERSION: "20"
      APP_NAME: "CondoGuardian"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: web_dashboard_ui/package-lock.json

      - name: Build React dashboard
        shell: pwsh
        run: |
          cd web_dashboard_ui
          npm ci
          npm run build
          if (Test-Path "..\backend\web_dist") {
            Remove-Item "..\backend\web_dist" -Recurse -Force
          }
          New-Item -ItemType Directory -Force -Path "..\backend\web_dist" | Out-Null
          Copy-Item "dist\*" "..\backend\web_dist" -Recurse -Force

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Verify backend import
        shell: pwsh
        env:
          CONDO_GUARDIAN_NO_BROWSER: "1"
          CONDO_GUARDIAN_DISABLE_CAMERA: "1"
        run: |
          python -c "import backend.app.main; print('Backend import OK')"

      - name: Build executable with PyInstaller
        shell: pwsh
        run: |
          $pyinstallerArgs = @(
            "--noconfirm",
            "--clean",
            "--onedir",
            "--name", "${env:APP_NAME}",
            "--console",
            "--add-data", "backend\web_dist;web_dist",
            "--collect-all", "cv2",
            "--hidden-import", "uvicorn.logging",
            "--hidden-import", "uvicorn.loops",
            "--hidden-import", "uvicorn.loops.auto",
            "--hidden-import", "uvicorn.protocols",
            "--hidden-import", "uvicorn.protocols.http",
            "--hidden-import", "uvicorn.protocols.http.auto",
            "--hidden-import", "uvicorn.protocols.websockets",
            "--hidden-import", "uvicorn.protocols.websockets.auto",
            "--hidden-import", "uvicorn.lifespan",
            "--hidden-import", "uvicorn.lifespan.on"
          )
          if (Test-Path "tools\ffmpeg.exe") {
            $pyinstallerArgs += @("--add-binary", "tools\ffmpeg.exe;tools")
          }
          $pyinstallerArgs += "desktop_launcher.py"
          pyinstaller @pyinstallerArgs

      - name: Verify executable exists
        shell: pwsh
        run: |
          $exePath = "dist\${env:APP_NAME}\${env:APP_NAME}.exe"
          if (!(Test-Path $exePath)) {
            Write-Error "Executable not found: $exePath"
            exit 1
          }
          Write-Host "Executable created successfully:"
          Get-Item $exePath

      - name: Upload Windows build artifact
        uses: actions/upload-artifact@v4
        with:
          name: CondoGuardian-Windows
          path: dist/CondoGuardian
          if-no-files-found: error
          retention-days: 14
