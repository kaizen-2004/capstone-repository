name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - perf/**

jobs:
  build-windows-installer:
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            web_dashboard_ui/package-lock.json
            desktop/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install WiX Toolset
        run: |
          choco upgrade wixtoolset --yes --no-progress

          $wixCandidates = @(
            "C:\Program Files (x86)\WiX Toolset v3.14\bin",
            "C:\Program Files\WiX Toolset v3.14\bin",
            "C:\Program Files (x86)\WiX Toolset v3.11\bin",
            "C:\Program Files\WiX Toolset v3.11\bin"
          )
          $wixBin = $wixCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1

          if (-not $wixBin) {
            $wixBin = Get-ChildItem -Path "C:\Program Files (x86)\WiX Toolset v3.*\bin", "C:\Program Files\WiX Toolset v3.*\bin" -Directory -ErrorAction SilentlyContinue |
              Sort-Object -Property FullName -Descending |
              Select-Object -First 1 -ExpandProperty FullName
          }

          if (-not $wixBin) {
            throw "WiX Toolset bin path not found."
          }

          Write-Host "Using WiX Toolset bin path: $wixBin"
          $wixBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build dashboard assets
        working-directory: web_dashboard_ui
        run: |
          npm ci
          npm run build

      - name: Install backend packaging dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install pyinstaller
          python -m pip install fastapi "uvicorn[standard]" pydantic numpy opencv-python httpx pywebpush zeroconf python-multipart

      - name: Build backend executable with PyInstaller
        run: |
          python -m PyInstaller `
            backend\run_backend.py `
            --name backend `
            --onedir `
            --clean `
            --noconfirm `
            --distpath backend\dist `
            --workpath backend\build `
            --specpath backend `
            --paths . `
            --hidden-import uvicorn.loops.auto `
            --hidden-import uvicorn.protocols.http.auto `
            --hidden-import uvicorn.protocols.websockets.auto `
            --hidden-import uvicorn.lifespan.on

          if (!(Test-Path .\backend\dist\backend\backend.exe)) {
            throw "backend.exe was not created."
          }

      - name: Stage Tauri resources
        run: |
          $resourcesRoot = ".\desktop\src-tauri\resources"

          Remove-Item -Recurse -Force .\desktop\src-tauri\resources -ErrorAction SilentlyContinue
          New-Item -ItemType Directory $resourcesRoot | Out-Null

          robocopy .\backend\dist\backend "$resourcesRoot\backend" /E
          if ($LASTEXITCODE -gt 7) {
            throw "robocopy backend failed with code $LASTEXITCODE"
          }

          if (Test-Path -Path .\backend\storage\models -PathType Container) {
            robocopy .\backend\storage\models "$resourcesRoot\models" /E
            if ($LASTEXITCODE -gt 7) {
              throw "robocopy models failed with code $LASTEXITCODE"
            }
          } else {
            New-Item -ItemType Directory "$resourcesRoot\models" -Force | Out-Null
            Set-Content -Path "$resourcesRoot\models\placeholder.txt" -Value "placeholder" -Encoding ascii
            Write-Warning "backend/storage/models not found; packaged installer will not include face/fire model files."
          }

          robocopy .\web_dashboard_ui\dist "$resourcesRoot\web_dist" /E
          if ($LASTEXITCODE -gt 7) {
            throw "robocopy web_dist failed with code $LASTEXITCODE"
          }

          Copy-Item .\.env.example "$resourcesRoot\.env.example" -Force

      - name: Build desktop MSI
        working-directory: desktop
        run: |
          npm ci
          npm run build

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi-installer
          path: desktop/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

      - name: Upload desktop EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-desktop-exe
          path: desktop/src-tauri/target/release/*.exe
          if-no-files-found: warn
